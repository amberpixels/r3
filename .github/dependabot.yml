version: 2

updates:
  # Keeps r3 on the latest k1 / years / expectto-be and the current
  # standardgo toolchain.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
