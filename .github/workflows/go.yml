name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Vet all modules
      run: just vet

    - name: Lint
      uses: golangci/golangci-lint-action@v9

    - name: Test (short, no Docker)
      run: just test-short

  # Full integration suite: runs the testcontainers-backed tests against real
  # Postgres/MySQL/MongoDB. GitHub-hosted ubuntu runners ship a working Docker
  # daemon, so testcontainers manages its own containers — no `services:` needed.
  # Gated behind `build` so we don't pull DB images when vet/lint/short fail.
  integration:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Test (full, with Docker/testcontainers)
      run: just test
