name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v3

      - name: Lint
        run: just lint

      - name: Test (short, no Docker)
        run: just test-short

  # Full integration suite: runs the testcontainers-backed tests against real
  # Postgres/MySQL/MongoDB. GitHub-hosted ubuntu runners ship a working Docker
  # daemon, so testcontainers manages its own containers — no `services:` needed.
  # Gated behind `ci` so we don't pull DB images when lint/short fail.
  integration:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v3

      - name: Test (full, with Docker/testcontainers)
        run: just test-integration
