name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Vet all modules
      run: make vet

#    - name: Lint
#      uses: golangci/golangci-lint-action@v7

    - name: Test (short, no Docker)
      run: make test-short
