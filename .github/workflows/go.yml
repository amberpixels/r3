name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Vet all modules
      run: just vet

    - name: Lint
      ses: golangci/golangci-lint-action@v9

    - name: Test (short, no Docker)
      run: just test-short
